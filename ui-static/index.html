<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>经颅光刺激仿真评估工作站</title>
  <style>
    :root {
      --bg: #edf7ff;
      --panel: rgba(247, 252, 255, 0.9);
      --panel-strong: rgba(255, 255, 255, 0.92);
      --blue: #2f8df7;
      --blue-deep: #1d6fb8;
      --cyan: #29c5e8;
      --green: #31b78d;
      --red: #f46f7d;
      --orange: #f59b3d;
      --yellow: #f1c84b;
      --gray: #93a9bd;
      --text: #173d62;
      --muted: #6f92b2;
      --line: rgba(96, 159, 218, 0.24);
      --shadow: 0 18px 48px rgba(49, 130, 206, 0.14);
      --radius: 10px;
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 1280px;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 10%, rgba(105, 181, 255, 0.22), transparent 28%),
        radial-gradient(circle at 76% 92%, rgba(41, 197, 232, 0.14), transparent 34%),
        linear-gradient(135deg, #fbfdff 0%, #edf7ff 52%, #f7fbff 100%);
    }

    button, input, select { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; }

    .app-shell {
      display: grid;
      grid-template-columns: 232px minmax(760px, 1fr) 340px;
      gap: 18px;
      min-height: 100vh;
      padding: 20px 24px 24px;
    }

    .sidebar,
    .panel,
    .right-panel,
    .modal-card {
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .sidebar {
      position: sticky;
      top: 20px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      height: calc(100vh - 44px);
      padding: 22px 18px;
      border-radius: 22px;
      background: rgba(235, 247, 255, 0.94);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 56px;
    }

    .brand img {
      width: 44px;
      height: auto;
      filter: drop-shadow(0 5px 10px rgba(47, 141, 247, 0.16));
    }

    .brand strong {
      display: block;
      color: var(--blue-deep);
      font-size: 15px;
      line-height: 1.22;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: #7aa7cb;
      font-size: 11px;
      font-weight: 800;
    }

    .side-title {
      margin: 26px 0 22px 8px;
      color: #5a9ed8;
      font-size: 13px;
      font-weight: 850;
    }

    .nav-list {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .nav-item {
      display: grid;
      grid-template-columns: 28px 1fr 16px;
      align-items: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 12px;
      border-radius: 10px;
      color: var(--blue-deep);
      background: rgba(222, 240, 255, 0.74);
      font-weight: 850;
      text-align: left;
      transition: 0.16s ease;
    }

    .nav-item:not(.disabled):hover,
    .nav-item.active {
      color: #fff;
      background: linear-gradient(180deg, #4aa3ff, #247bd2);
      box-shadow: 0 12px 26px rgba(47, 141, 247, 0.24);
    }

    .nav-item.disabled {
      opacity: 0.42;
      filter: grayscale(0.35);
    }

    .nav-index {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      font-size: 12px;
    }

    .nav-lock {
      color: inherit;
      opacity: 0.72;
      font-size: 12px;
      text-align: right;
    }

    .user-status {
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .user-tools {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 2px;
    }

    .side-btn {
      min-height: 32px;
      border-radius: 8px;
      color: var(--blue-deep);
      background: rgba(232, 244, 255, 0.9);
      font-size: 12px;
      font-weight: 900;
    }

    .side-btn.logout {
      color: #c8515d;
      background: #fff1f3;
    }

    .user-status b {
      color: var(--text);
      font-size: 15px;
    }

    .status-dot {
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }

    .status-dot::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(49, 183, 141, 0.12);
    }

    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 16px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 52px;
      padding: 0 4px;
    }

    .crumbs {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
    }

    .crumbs b { color: var(--blue-deep); }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #416887;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d8efff, #9dd6ff);
      box-shadow: 0 8px 20px rgba(49, 130, 206, 0.13);
    }

    .workspace {
      display: grid;
      gap: 16px;
      align-content: start;
    }

    .panel { padding: 22px 26px; }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 18px;
    }

    .section-head h1,
    .section-head h2 {
      margin: 0;
      color: var(--blue-deep);
      font-size: 24px;
      line-height: 1.2;
      font-weight: 950;
    }

    .section-head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      font-weight: 700;
    }

    .button-row,
    .tabs {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .action-btn,
    .ghost-btn,
    .danger-btn {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 14px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
    }

    .action-btn {
      color: #fff;
      background: linear-gradient(180deg, #4aa3ff, #247bd2);
      box-shadow: 0 10px 20px rgba(47, 141, 247, 0.22);
    }

    .ghost-btn {
      color: var(--blue-deep);
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
    }

    .danger-btn {
      color: #c8515d;
      background: #fff1f3;
    }

    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }

    .card {
      min-height: 86px;
      padding: 16px;
      border: 1px solid rgba(96, 159, 218, 0.18);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.72);
    }

    .card h3 {
      margin: 0 0 10px;
      color: var(--blue-deep);
      font-size: 16px;
      font-weight: 950;
    }

    .card p,
    .card small {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 750;
    }

    .project-card {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr 0.8fr 0.9fr auto;
      align-items: center;
      gap: 12px;
      min-height: 54px;
      padding: 0 14px;
      border-radius: 9px;
      background: rgba(255,255,255,0.7);
      color: #527898;
      font-size: 12px;
      font-weight: 820;
    }

    .row b { color: var(--text); font-size: 13px; }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      padding: 0 9px;
      border-radius: 5px;
      color: #fff;
      background: var(--blue);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    .chip.green { background: var(--green); }
    .chip.red { background: var(--red); }
    .chip.orange { background: var(--orange); }
    .chip.gray { background: var(--gray); }
    .chip.yellow { color: #715d00; background: var(--yellow); }

    .viewer-grid {
      display: grid;
      grid-template-columns: 1.25fr 0.95fr;
      gap: 16px;
      align-items: stretch;
    }

    .brain-view,
    .slice-view,
    .report-preview {
      border: 1px solid rgba(96, 159, 218, 0.22);
      border-radius: 10px;
      background:
        radial-gradient(circle at 50% 44%, rgba(47, 141, 247, 0.24), transparent 30%),
        linear-gradient(145deg, rgba(255,255,255,0.86), rgba(222,240,255,0.78));
      position: relative;
      overflow: hidden;
    }

    .brain-view {
      min-height: 330px;
      display: grid;
      place-items: center;
    }

    .brain-view::before {
      content: "";
      width: 230px;
      height: 180px;
      border-radius: 48% 52% 46% 54%;
      background:
        radial-gradient(circle at 62% 36%, rgba(245,111,125,0.65) 0 7px, transparent 8px),
        radial-gradient(circle at 39% 53%, rgba(41,197,232,0.72) 0 9px, transparent 10px),
        repeating-radial-gradient(ellipse at center, rgba(47,141,247,0.16) 0 8px, rgba(255,255,255,0.4) 9px 18px);
      box-shadow: inset 0 0 0 2px rgba(47,141,247,0.2), 0 22px 48px rgba(47,141,247,0.16);
    }

    .beam::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 18%;
      width: 9px;
      height: 230px;
      transform: rotate(33deg);
      transform-origin: top;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(41,197,232,0.75), rgba(47,141,247,0.05));
      box-shadow: 0 0 22px rgba(41,197,232,0.45);
    }

    .slice-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .slice-view {
      min-height: 126px;
      display: grid;
      place-items: center;
      color: var(--blue-deep);
      font-size: 13px;
      font-weight: 900;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full { grid-column: 1 / -1; }

    .field label {
      color: var(--blue-deep);
      font-size: 13px;
      font-weight: 900;
    }

    .field input,
    .field select {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 9px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr 84px;
      gap: 10px;
      align-items: center;
    }

    input[type="range"] { width: 100%; accent-color: var(--blue); }

    .qc-list,
    .metric-list,
    .notice-list {
      display: grid;
      gap: 10px;
    }

    .qc-item,
    .metric-item,
    .notice-item {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      min-height: 46px;
      padding: 0 12px;
      border-radius: 9px;
      background: rgba(255,255,255,0.7);
      color: #527898;
      font-size: 12px;
      font-weight: 850;
    }

    .metric-item b {
      color: var(--blue-deep);
      font-size: 18px;
    }

    .right-column {
      position: sticky;
      top: 20px;
      display: grid;
      align-content: start;
      gap: 16px;
      height: calc(100vh - 44px);
      overflow: auto;
    }

    .right-panel { padding: 18px; }

    .right-panel h2 {
      margin: 0 0 14px;
      color: var(--blue-deep);
      font-size: 18px;
      font-weight: 950;
    }

    .progress {
      height: 8px;
      border-radius: 999px;
      background: #d8ebfb;
      overflow: hidden;
    }

    .progress i {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
    }

    .report-preview {
      min-height: 470px;
      padding: 24px;
      background: #fff;
    }

    .report-preview h3 {
      margin: 0 0 12px;
      color: var(--blue-deep);
      font-size: 22px;
    }

    .report-title {
      text-align: center;
      margin-bottom: 16px;
    }

    .report-title h3 {
      margin-bottom: 4px;
      font-size: 24px;
    }

    .report-title p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .report-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .report-block {
      margin-top: 14px;
      padding: 14px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #f7fbff;
    }

    .report-block h4 {
      margin: 0 0 10px;
      color: var(--blue-deep);
      font-size: 15px;
      font-weight: 950;
    }

    .report-table {
      display: grid;
      gap: 6px;
    }

    .report-line {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      color: var(--text);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 760;
    }

    .report-line span:first-child {
      color: var(--muted);
      font-weight: 900;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      place-items: center;
      background: rgba(18, 58, 92, 0.28);
      backdrop-filter: blur(5px);
    }

    .modal-backdrop.active { display: grid; }
    .modal-card { width: 520px; padding: 22px; background: #f8fcff; }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      z-index: 80;
      display: none;
      min-height: 42px;
      align-items: center;
      padding: 0 16px;
      border-radius: 10px;
      color: #fff;
      background: var(--blue-deep);
      box-shadow: var(--shadow);
      font-size: 13px;
      font-weight: 900;
    }

    .toast.active { display: inline-flex; }

    @media (max-width: 1440px) {
      .app-shell {
        grid-template-columns: 210px minmax(690px, 1fr) 318px;
        padding: 18px;
      }

      .grid-4 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="../assets/system-logo.png" alt="">
        <div>
          <strong>经颅光刺激仿真评估工作站</strong>
          <span>SIMULATION WORKSTATION</span>
        </div>
      </div>

      <div class="side-title">主流程步骤</div>
      <nav class="nav-list" id="navList" aria-label="主流程导航"></nav>

      <div class="user-status">
        <span>当前登录用户</span>
        <b id="sideUser">李医生 · 操作者</b>
        <span class="status-dot" id="deviceState">设备在线</span>
        <div class="user-tools">
          <button class="side-btn" id="userSettingsBtn" type="button">用户设置</button>
          <button class="side-btn logout" id="sideLogoutBtn" type="button">退出登录</button>
        </div>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <div class="crumbs"><span>当前步骤</span><b id="pageCrumb">项目中心</b><span id="projectCrumb">P001_前额叶_tDCS研究</span></div>
        <div class="top-actions">
          <span>2026 / 07 / 04</span>
          <span>License 有效</span>
          <span>数据域 华东-01</span>
          <div class="avatar" aria-hidden="true"></div>
        </div>
      </header>

      <section class="workspace" id="workspace"></section>
    </main>

    <aside class="right-column" id="rightColumn"></aside>
  </div>

  <div class="modal-backdrop" id="projectModal" aria-hidden="true">
    <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="projectModalTitle">
      <div class="section-head">
        <div>
          <h2 id="projectModalTitle">新建项目</h2>
          <p>项目名称将用于报告命名和本地文件夹命名，需保持唯一。</p>
        </div>
      </div>
      <div class="form-grid">
        <div class="field full">
          <label for="projectName">项目名称</label>
          <input id="projectName" type="text" value="P004_深部脑区光刺激评估">
        </div>
        <div class="field full">
          <label for="patientKey">患者关键信息</label>
          <input id="patientKey" type="text" value="Sub-004 / 56岁 / 个性化">
        </div>
      </div>
      <div class="button-row" style="justify-content:flex-end;margin-top:18px">
        <button class="ghost-btn" id="closeProjectModal" type="button">取消</button>
        <button class="action-btn" id="confirmProject" type="button">创建项目</button>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const steps = [
      { id: "project", label: "项目中心", icon: "01" },
      { id: "image", label: "影像分析", icon: "02" },
      { id: "target", label: "靶点规划", icon: "03" },
      { id: "params", label: "参数设置", icon: "04" },
      { id: "simulation", label: "仿真评估", icon: "05" },
      { id: "confirm", label: "方案确认", icon: "06" },
      { id: "report", label: "报告输出", icon: "07" }
    ];

    const state = {
      step: 0,
      maxUnlocked: 0,
      deviceOnline: true,
      selectedProject: "P001_前额叶_tDCS研究",
      projects: [
        { name: "P001_前额叶_tDCS研究", created: "2026-07-01", cases: 3, modified: "2026-07-04 18:20" },
        { name: "P002_卒中康复_tPCS研究", created: "2026-06-28", cases: 2, modified: "2026-07-03 12:45" },
        { name: "P003_睡眠调控_tPBM评估", created: "2026-06-22", cases: 5, modified: "2026-07-02 09:10" }
      ],
      targets: [
        { name: "F3 前额叶", coord: "38, 44, 28", status: "已确认" },
        { name: "F4 前额叶", coord: "-36, 42, 30", status: "待确认" }
      ],
      saved: false
    };

    const navList = document.querySelector("#navList");
    const workspace = document.querySelector("#workspace");
    const rightColumn = document.querySelector("#rightColumn");
    const pageCrumb = document.querySelector("#pageCrumb");
    const projectCrumb = document.querySelector("#projectCrumb");
    const toast = document.querySelector("#toast");

    document.querySelector("#userSettingsBtn").addEventListener("click", () => showToast("用户设置已打开：李医生 · 操作者"));
    document.querySelector("#sideLogoutBtn").addEventListener("click", () => {
      window.location.href = "../index.html";
    });

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add("active");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("active"), 1800);
    }

    function unlockTo(index) {
      state.maxUnlocked = Math.max(state.maxUnlocked, index);
      state.step = index;
      render();
    }

    function goStep(index) {
      if (index > state.maxUnlocked) return;
      state.step = index;
      render();
    }

    function nextStep() {
      unlockTo(Math.min(state.step + 1, steps.length - 1));
    }

    function renderNav() {
      navList.innerHTML = steps.map((step, index) => {
        const disabled = index > state.maxUnlocked;
        const active = index === state.step;
        const done = index < state.maxUnlocked;
        return `
          <button class="nav-item ${active ? "active" : ""} ${disabled ? "disabled" : ""}" type="button" ${disabled ? "disabled" : ""} data-index="${index}">
            <span class="nav-index">${done ? "✓" : step.icon}</span>
            <span>${step.label}</span>
            <span class="nav-lock">${disabled ? "锁定" : "›"}</span>
          </button>
        `;
      }).join("");
      navList.querySelectorAll(".nav-item").forEach((button) => {
        button.addEventListener("click", () => goStep(Number(button.dataset.index)));
      });
      document.querySelector("#sideUser").textContent = "李医生 · 操作者";
      document.querySelector("#deviceState").textContent = state.deviceOnline ? "设备在线" : "设备离线";
    }

    function shell(title, desc, body, actions = "") {
      return `
        <article class="panel">
          <div class="section-head">
            <div>
              <h1>${title}</h1>

    function bindPageEvents() {
      document.querySelectorAll(".next-btn").forEach((button) => button.addEventListener("click", nextStep));

        showToast(`已选择${button.dataset.type}方案`);
        unlockTo(1);
      }));
      document.querySelectorAll(".quick-open, .enter-project").forEach((button) => button.addEventListener("click", () => {
        state.selectedProject = button.dataset.project || "P001_前额叶_tDCS研究";
        showToast("已进入项目并解锁影像分析");
        unlockTo(1);
      }));
      document.querySelector("#newProjectBtn")?.addEventListener("click", () => openProjectModal());
      document.querySelector("#segmentBtn")?.addEventListener("click", () => showToast("组织分割已完成，质控通过"));

        state.targets.push({ name: "海马深部靶点", coord: "24, -18, -12", status: "未设置" });
        render();
      });
      document.querySelectorAll(".delete-target").forEach((button) => button.addEventListener("click", () => {
        state.targets.splice(Number(button.dataset.index), 1);
        render();
      }));
      document.querySelector("#openPlus")?.addEventListener("click", () => {
        workspace.innerHTML = renderTarget(true);
        bindPageEvents();
      });
      document.querySelector("#returnParams")?.addEventListener("click", () => render());
      document.querySelector("#backParams")?.addEventListener("click", () => goStep(3));
      document.querySelector("#returnEdit")?.addEventListener("click", () => goStep(3));
      document.querySelectorAll(".run-sim, .run-ai").forEach((button) => button.addEventListener("click", () => {
        const status = document.querySelector("#simStatus");
        status.textContent = "进行中";
        status.className = "chip orange";
        setTimeout(() => {
          status.textContent = "完成";
          status.className = "chip green";
          showToast("仿真完成，安全阈值通过");
        }, 600);
      }));
      document.querySelector("#pdfBtn")?.addEventListener("click", () => {
        state.saved = true;
        renderRight();
        showToast("PDF 已生成：TLS-20260704-001.pdf");
      });
      document.querySelector("#saveRecord")?.addEventListener("click", () => {
        state.saved = true;
        renderRight();
        showToast(`已保存至 ${state.selectedProject}`);
      });
      document.querySelector("#sendDevice")?.addEventListener("click", () => showToast("方案已加入设备下发队列"));
    }

    function openProjectModal() {
      document.querySelector("#projectModal").classList.add("active");
      document.querySelector("#projectModal").setAttribute("aria-hidden", "false");
      document.querySelector("#projectName").focus();
    }

    function closeProjectModal() {
      document.querySelector("#projectModal").classList.remove("active");
      document.querySelector("#projectModal").setAttribute("aria-hidden", "true");
    }

    document.querySelector("#closeProjectModal").addEventListener("click", closeProjectModal);
    document.querySelector("#confirmProject").addEventListener("click", () => {
      const name = document.querySelector("#projectName").value.trim();
      if (!name) return showToast("请输入项目名称");
      if (state.projects.some((project) => project.name === name)) return showToast("项目名已存在，请修改");
      state.projects.unshift({ name, created: "2026-07-04", cases: 0, modified: "刚刚" });
      state.selectedProject = name;
      closeProjectModal();
      showToast("项目创建成功");
      render();
    });

    function render() {
      const step = steps[state.step];
      pageCrumb.textContent = step.label;
      projectCrumb.textContent = state.selectedProject;
      renderNav();
      const views = [renderProject, renderImage, renderTarget, renderParams, renderSimulation, renderConfirm, renderReport];
      workspace.innerHTML = views[state.step]();
      renderRight();
      bindPageEvents();
    }

    render();
  </script>
</body>
</html>
